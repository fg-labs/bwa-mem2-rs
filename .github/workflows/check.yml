name: Check

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: macos-latest
            arch: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
      - run: cargo ci-build
      - run: cargo ci-test

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo ci-fmt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
      - run: cargo ci-lint

  e2e:
    # End-to-end regression: build the PhiX index via bwa-mem3, simulate
    # paired reads, run `bwa-rs mem`, verify samtools can parse the output
    # and at least 2N records come back for N pairs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install build deps + samtools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev samtools \
            autoconf automake
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2
      # bwa-mem3 isn't on bioconda yet (upstream README: "coming soon"),
      # so build the binary from the same upstream commit we vendor.
      # The vendored snapshot is intentionally pruned (no ext/htslib,
      # ext/libsais, ext/mimalloc) because the Rust crate doesn't compile
      # those, but the upstream Makefile does — so for the e2e build we
      # clone fresh at the same SHA with all submodules.
      # TODO: switch back to `bioconda::bwa-mem3` once published.
      - name: Build bwa-mem3 from upstream at vendored COMMIT
        run: |
          set -euo pipefail
          sha="$(cat bwa-mem3-sys/vendor/COMMIT)"
          # Blobless single-commit clone of the SHA we vendored. Avoids
          # pulling the full upstream history every CI run.
          git clone --filter=blob:none --no-tags --no-checkout \
            https://github.com/fg-labs/bwa-mem3.git /tmp/bwa-mem3
          git -C /tmp/bwa-mem3 checkout "$sha"
          git -C /tmp/bwa-mem3 submodule update --init --recursive --depth 1
          # Single-arch build: PhiX e2e doesn't need the multi-SIMD
          # launcher (which compiles 5 variants).
          make -C /tmp/bwa-mem3 arch=sse41 -j"$(nproc)" all
          echo "BWA_MEM3_BIN=/tmp/bwa-mem3/bwa-mem3" >> "$GITHUB_ENV"
      - name: Run e2e test
        run: cargo test -p bwa-mem3-rs-cli --test e2e -- --nocapture
